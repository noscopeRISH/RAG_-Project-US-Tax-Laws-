<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax & Legal RAG Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-gradient: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            --accent-hover: linear-gradient(135deg, #c084fc 0%, #818cf8 100%);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 1rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.8s ease-out;
        }

        .glass-card:hover {
            border-color: rgba(168, 85, 247, 0.3);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.4), 0 10px 15px -10px rgba(168, 85, 247, 0.1);
        }

        .search-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-group {
            position: relative;
            display: flex;
            flex-direction: column;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.5;
            resize: vertical;
            outline: none;
            transition: all 0.2s ease;
        }

        textarea:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
            background: rgba(15, 23, 42, 0.8);
        }

        textarea::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 1rem;
        }

        .kb-hint {
            font-size: 0.85rem;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        button {
            background: var(--accent-gradient);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.35);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loader-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 2rem 0;
            animation: fadeIn 0.3s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(168, 85, 247, 0.1);
            border-top-color: #a855f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 400;
        }

        .results-container {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .results-container.active {
            display: flex;
        }

        .result-section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .answer-body {
            line-height: 1.7;
            color: #e2e8f0;
            font-size: 1.05rem;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
        }

        .answer-body p {
            margin-bottom: 1rem;
        }
        
        .answer-body p:last-child {
            margin-bottom: 0;
        }

        .sources-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }

        @media (min-width: 640px) {
            .sources-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .source-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .source-card:hover {
            border-color: rgba(99, 102, 241, 0.4);
            background: rgba(15, 23, 42, 0.6);
            transform: translateY(-2px);
        }

        .source-icon {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            border-radius: 8px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .source-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            overflow: hidden;
        }

        .source-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .source-page {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        footer {
            margin-top: auto;
            padding: 2rem 0 1rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            opacity: 0.6;
        }

        /* Animations */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Tax & Legal RAG Search</h1>
            <p>Hybrid Search and Document Grounded Answers</p>
        </header>

        <main class="glass-card">
            <form id="search-form" class="search-form" onsubmit="handleSearch(event)">
                <div class="input-group">
                    <textarea 
                        id="query-input" 
                        placeholder="Ask a question about US tax or legal guidelines (e.g. what is general provisions?)..."
                        required
                        onkeydown="checkSubmit(event)"
                    ></textarea>
                </div>
                <div class="form-actions">
                    <span class="kb-hint">Press Enter ↵ to submit</span>
                    <button type="submit" id="submit-btn">
                        <span>Search</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                </div>
            </form>

            <div id="loader" class="loader-container">
                <div class="spinner"></div>
                <span class="loader-text" id="loader-text">Reading documents...</span>
            </div>

            <div id="results" class="results-container">
                <div>
                    <h2 class="result-section-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        Generated Answer
                    </h2>
                    <div id="answer" class="answer-body"></div>
                </div>

                <div>
                    <h2 class="result-section-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        Source References
                    </h2>
                    <div id="sources" class="sources-list"></div>
                </div>
            </div>
        </main>

        <footer>
            Minimal Hybrid RAG System • Powered by Mistral AI & FAISS
        </footer>
    </div>

    <script>
        const queryInput = document.getElementById('query-input');
        const submitBtn = document.getElementById('submit-btn');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');
        const results = document.getElementById('results');
        const answerDiv = document.getElementById('answer');
        const sourcesDiv = document.getElementById('sources');

        function checkSubmit(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('search-form').requestSubmit();
            }
        }

        async function handleSearch(e) {
            e.preventDefault();
            const query = queryInput.value.trim();
            if (!query) return;

            // UI State transitions
            submitBtn.disabled = true;
            results.classList.remove('active');
            loader.style.display = 'flex';
            
            // Subtle transition loader messages
            const loadingMessages = [
                "Retrieving chunks via FAISS & BM25...",
                "Running Reciprocal Rank Fusion merging...",
                "Drafting response with Mistral AI..."
            ];
            let msgIdx = 0;
            loaderText.innerText = loadingMessages[0];
            const interval = setInterval(() => {
                msgIdx = (msgIdx + 1) % loadingMessages.length;
                loaderText.innerText = loadingMessages[msgIdx];
            }, 2500);

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ question: query })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }

                const data = await response.json();
                
                // Format answer
                answerDiv.innerHTML = data.answer.split('\n').map(para => {
                    if (!para.trim()) return '';
                    return `<p>${escapeHtml(para)}</p>`;
                }).join('');

                // Format sources
                sourcesDiv.innerHTML = '';
                if (data.citations && data.citations.length > 0) {
                    // Filter unique sources to keep UI tidy
                    const seen = new Set();
                    data.citations.forEach(cite => {
                        const key = `${cite.source}_${cite.page}`;
                        if (seen.has(key)) return;
                        seen.add(key);

                        const card = document.createElement('div');
                        card.className = 'source-card';
                        card.innerHTML = `
                            <div class="source-icon">PDF</div>
                            <div class="source-info">
                                <span class="source-name" title="${escapeHtml(cite.source)}">${escapeHtml(cite.source)}</span>
                                <span class="source-page">Page ${cite.page}</span>
                            </div>
                        `;
                        sourcesDiv.appendChild(card);
                    });
                } else {
                    sourcesDiv.innerHTML = '<div class="source-card" style="grid-column: 1/-1;"><span class="source-page">No verified sources cited.</span></div>';
                }

                clearInterval(interval);
                loader.style.display = 'none';
                results.classList.add('active');

            } catch (error) {
                console.error("Search failed:", error);
                clearInterval(interval);
                loader.style.display = 'none';
                alert("An error occurred while fetching search results. Please try again.");
            } finally {
                submitBtn.disabled = false;
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }
    </script>
</body>
</html>
